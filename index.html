<!DOCTYPE html>
<html lang="si">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>සිංහල අනුරාගය</title>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="hero">
		<h1>✨ ආයුබෝවන්! ✨</h1>
		<p class="subtitle">මේ අපේ සිහින වෙබ් අඩවියයි</p>
		<button id="magicBtn">හදවත ස්පර්ශ කරන්න</button>
		<div class="heart-message" id="heartMsg"></div>
	</div>

	<div class="cards">
		<div class="card">
			<h3>🌛 සඳ</h3>
			<p>සිහිනයක් තරම් මෘදුයි</p>
		</div>
		<div class="card">
			<h3>⭐ තරු</h3>
			<p>දිලිසෙන සිතුවිලි</p>
		</div>
		<div class="card">
			<h3>💎 මැණික</h3>
			<p>ඔයා වගේ අගනේය</p>
		</div>
	</div>
	<footer>
		<p>💖 සිංහලෙන් හදපු හිතක්</p>
	</footer>
	<script src="script.js"></script>
</body>
</html>
